<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSN Viewer Agent Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --bg-bubble-user: #e2e8f0;
            --text-bubble-user: #0f172a;
            --bg-bubble-agent: transparent;
            --text-bubble-agent: #0f172a;
            --primary: #0969da;
            --primary-hover: #0353b2;
            --danger: #ef4444;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'Fira Code', Consolas, Monaco, monospace;
            --code-bg: #f6f8fa;
            --code-border: #d0d7de;
            --code-text: #24292f;
            --code-inline-text: #cf222e;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --connection-bg: #e2e8f0;
            --connection-text: #475569;
            --connection-active-bg: #dcfce7;
            --connection-active-text: #15803d;
            --connection-reconnecting-bg: #fef3c7;
            --connection-reconnecting-text: #b45309;
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
            --toggle-active-bg: #22c55e;
            --toggle-active-text: #ffffff;
            --toggle-active-border: #16a34a;
        }

        [data-theme="dark"] {
            --bg-main: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --bg-bubble-user: #27272a;
            --text-bubble-user: #f4f4f5;
            --bg-bubble-agent: transparent;
            --text-bubble-agent: #f4f4f5;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --code-bg: #161b22;
            --code-border: #30363d;
            --code-text: #e6edf3;
            --code-inline-text: #ff7b72;
            --input-bg: #09090b;
            --input-text: #f4f4f5;
            --connection-bg: #27272a;
            --connection-text: #a1a1aa;
            --connection-active-bg: #064e3b;
            --connection-active-text: #34d399;
            --connection-reconnecting-bg: #78350f;
            --connection-reconnecting-text: #fbbf24;
            --badge-bg: #27272a;
            --badge-text: #e4e4e7;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -1px rgba(0,0,0,0.1);
            --toggle-active-bg: #22c55e;
            --toggle-active-text: #ffffff;
            --toggle-active-border: #16a34a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 52px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
            transition: background-color 0.2s, border-color 0.2s;
        }

        header h1 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
        }

        .status-badge {
            background-color: var(--connection-bg);
            color: var(--connection-text);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 500;
            transition: all 0.2s;
        }

        /* ── Workspace ───────────────────────────────────── */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 52px);
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 14px;
            min-width: 0;
        }

        /* ── Pane header / controls ──────────────────────── */
        .pane-header {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .pane-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-wrap: wrap;
        }

        /* iOS-style toggle switch */
        .ios-toggle {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
        }

        .ios-toggle input { display: none; }

        .ios-toggle-track {
            width: 42px;
            height: 24px;
            border-radius: 9999px;
            background: #b0b7c3;
            transition: background 0.22s;
            position: relative;
            flex-shrink: 0;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.18);
        }

        [data-theme="dark"] .ios-toggle-track { background: #52525b; }

        .ios-toggle input:checked + .ios-toggle-track {
            background: var(--toggle-active-bg);
        }

        .ios-toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.28);
            transition: transform 0.22s cubic-bezier(.4,0,.2,1);
        }

        .ios-toggle input:checked + .ios-toggle-track .ios-toggle-thumb {
            transform: translateX(18px);
        }

        /* Model selector dropdown */
        #model-selector {
            padding: 5px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-primary);
            background-color: var(--bg-card);
            outline: none;
            cursor: pointer;
            transition: all 0.15s;
            max-width: 180px;
            font-family: var(--font-family);
        }

        #model-selector:focus { border-color: var(--primary); }

        /* Model status label (left of toggle) */
        #active-model-badge {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }

        #active-model-badge.active {
            color: var(--connection-active-text);
            font-weight: 600;
        }

        .btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px 11px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            outline: none;
            transition: all 0.15s;
            box-shadow: var(--shadow);
            white-space: nowrap;
            font-family: var(--font-family);
        }

        .btn:hover {
            background-color: var(--badge-bg);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            color: #fff;
            border-color: var(--primary-hover);
        }

        /* ── Chat log ────────────────────────────────────── */
        #chat-log {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 10px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .msg-wrapper { display: flex; width: 100%; animation: fadeInUp 0.18s ease-out; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

        .msg-wrapper-user { justify-content: flex-end; }
        .msg-wrapper-agent {
            justify-content: flex-start;
            flex-direction: column;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }
        .msg-wrapper-system, .msg-wrapper-error { justify-content: center; }

        .msg {
            max-width: 82%;
            padding: 9px 13px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 13.5px;
            line-height: 1.55;
        }

        .msg-system {
            background-color: var(--badge-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11.5px;
            border-radius: 6px;
            text-align: center;
            padding: 4px 12px;
            max-width: 86%;
        }

        .msg-user {
            background-color: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-bottom-right-radius: 2px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .msg-agent-header {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 6px;
            user-select: none;
        }

        .msg-agent {
            background: var(--bg-bubble-agent);
            color: var(--text-bubble-agent);
            padding: 0;
            max-width: 100%;
            width: 100%;
        }

        .msg-agent p { margin: 0 0 9px 0; }
        .msg-agent p:last-child { margin-bottom: 0; }
        .msg-agent h1,h2,h3,h4 { margin: 14px 0 7px 0; color: var(--text-primary); font-weight: 600; }
        .msg-agent h1 { font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 3px; }
        .msg-agent h2 { font-size: 14px; }
        .msg-agent h3 { font-size: 13px; }
        .msg-agent ul,ol { margin: 0 0 9px 0; padding-left: 20px; }
        .msg-agent li { margin-bottom: 3px; }
        .msg-agent code {
            font-family: var(--font-mono);
            font-size: 11.5px;
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            color: var(--code-inline-text);
            padding: 2px 5px;
            border-radius: 4px;
        }
        .msg-agent pre {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 10px 14px;
            overflow-x: auto;
            margin: 7px 0 11px 0;
        }
        .msg-agent pre code { padding:0; background:transparent; border:none; color:var(--code-text); font-size:12px; }
        .msg-agent strong { font-weight: 600; color: var(--text-primary); }
        .msg-agent em { font-style: italic; }
        .msg-agent blockquote { border-left:4px solid var(--primary); margin:0 0 9px 0; padding-left:11px; color:var(--text-secondary); font-style:italic; }

        .msg-error {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--danger);
            border-radius: 8px;
            padding: 9px 13px;
            max-width: 86%;
            font-weight: 500;
        }
        [data-theme="dark"] .msg-error { background-color:#450a0a; border-color:#7f1d1d; color:#fca5a5; }

        .code-box {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--code-text);
            margin-top: 11px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            width: 100%;
            box-shadow: var(--shadow);
        }

        .code-box-header, .terminal-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--code-border);
            margin-bottom: 7px;
            padding-bottom: 5px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }

        .copy-btn {
            background: none; border: none;
            color: var(--text-secondary);
            cursor: pointer; font-size:11px; font-weight:500;
            padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
        }
        .copy-btn:hover { color: var(--text-primary); background: var(--border-color); }

        .terminal-output-box {
            background: var(--code-bg); border: 1px solid var(--code-border);
            border-radius: 6px; padding: 10px 14px;
            font-family: var(--font-mono); font-size: 11.5px; color: var(--code-text);
            margin-top: 8px; white-space: pre-wrap; word-wrap: break-word;
            line-height: 1.4; width: 100%; box-shadow: var(--shadow);
        }
        .terminal-output-box pre { margin:0; padding:0; background:transparent; border:none; overflow-x:auto; }

        .thought-box {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            margin-top: 11px;
            margin-bottom: 15px; /* Added spacing from the response text */
            width: 100%;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .thought-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: var(--code-bg);
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
            transition: background 0.15s;
        }
        .thought-box-header:hover {
            background: var(--border-color);
        }
        .thought-box-toggle {
            font-size: 12px;
            transition: transform 0.2s ease;
        }
        .thought-box.expanded .thought-box-toggle {
            transform: rotate(90deg);
        }
        .thought-box-content {
            display: none;
            padding: 16px 14px; /* Increased top/bottom padding */
            border-top: 1px solid var(--code-border);
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            background: var(--code-bg);
        }
        .thought-box.expanded .thought-box-content {
            display: block;
        }

        .token-info {
            font-size: 10.5px; color: var(--text-secondary);
            margin-top: 7px; display: inline-block;
            background: var(--code-bg); border: 1px solid var(--code-border);
            padding: 2px 8px; border-radius: 4px;
        }

        /* ── Chat input bar ──────────────────────────────── */
        .chat-input-bar {
            display: flex; gap: 8px; height: 40px; flex-shrink: 0;
        }

        #chat-input-field {
            flex: 1; padding: 0 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 13.5px; outline: none;
            background: var(--input-bg); color: var(--input-text);
            box-shadow: var(--shadow); transition: all 0.15s;
            font-family: var(--font-family);
        }
        #chat-input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        #chat-input-field:disabled { background: var(--badge-bg); color: var(--text-secondary); cursor: not-allowed; }

        /* ═══════════════════════════════════════════════════
           RIGHT PANEL — Model Cards Manager
           ═══════════════════════════════════════════════════ */
        .models-panel {
            width: 0;
            min-width: 0;
            overflow: hidden;
            transition: width 0.25s ease, min-width 0.25s ease;
            background-color: var(--bg-card);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .models-panel.open {
            width: 330px;
            min-width: 330px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 14px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .close-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); font-size: 14px;
            padding: 3px 6px; border-radius: 4px; transition: all 0.15s;
        }
        .close-btn:hover { background: var(--badge-bg); color: var(--text-primary); }

        .cards-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 4px;
        }

        .panel-footer {
            display: flex;
            gap: 8px;
            padding: 10px 8px;
            border-top: 1px solid var(--border-color);
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* ── Individual Model Card ───────────────────────── */
        .model-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            background: var(--bg-card);
            transition: border-color 0.15s;
        }
        .model-card:hover { border-color: var(--text-secondary); }

        .model-card-header {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        .card-name-label {
            flex: 1;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .drag-handle {
            cursor: grab;
            color: var(--text-secondary);
            font-size: 14px;
            padding: 2px 4px;
            flex-shrink: 0;
            line-height: 1;
            user-select: none;
            touch-action: none;
        }
        .drag-handle:active { cursor: grabbing; }
        .model-card.drag-over-top    { border-top: 2px solid var(--primary); }
        .model-card.drag-over-bottom { border-bottom: 2px solid var(--primary); }
        .model-card.dragging         { opacity: 0.45; }

        .card-delete-btn {
            background: none; border: none; cursor: pointer;
            color: var(--danger); font-size: 13px;
            padding: 3px 5px; border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0;
        }
        .card-delete-btn:hover { background: #fee2e2; }
        [data-theme="dark"] .card-delete-btn:hover { background: #450a0a; color: #fca5a5; }

        .card-expand-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-secondary); font-size: 18px;
            padding: 3px 5px; border-radius: 4px; transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
        }
        .card-expand-btn:hover { background: var(--badge-bg); color: var(--text-primary); }

        .model-card-body {
            padding: 10px 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-main);
        }
        .model-card.expanded .model-card-body { display: flex; }

        .card-field-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-field input[type="text"],
        .card-field input[type="password"],
        .card-field input[type="number"] {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            background: var(--input-bg);
            color: var(--input-text);
            outline: none;
            transition: border-color 0.15s;
            font-family: var(--font-family);
        }
        .card-field input:focus { border-color: var(--primary); }

        .show-key-btn {
            padding: 4px 8px;
            font-size: 11px;
            flex-shrink: 0;
            box-shadow: none;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Border-radius on chat log bottom corners */
        #chat-log { border-radius: 0 0 8px 8px; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 SSN Viewer Agent Chat</h1>
        <div style="display:flex;align-items:center;gap:10px;">
            <button class="btn" id="theme-toggle-btn" style="border-radius:9999px;padding:4px 12px;font-weight:500;box-shadow:none;">🌙 Dark Mode</button>
            <div id="connection-status" class="status-badge">Connecting...</div>
        </div>
    </header>

    <div class="workspace">
        <!-- Chat area -->
        <div class="chat-container">
            <div class="pane-header">
                <span class="pane-title">Agent Control Panel</span>
                <div class="header-controls">
                    <span id="active-model-badge">Deactivated</span>
                    <label id="agent-toggle-btn" class="ios-toggle" title="Toggle agent on/off">
                        <input type="checkbox" id="agent-toggle-input">
                        <span class="ios-toggle-track"><span class="ios-toggle-thumb"></span></span>
                    </label>
                    <select id="model-selector" title="Select model card"></select>
                    <button class="btn" id="models-panel-btn" title="Manage model cards">⚙ Models</button>
                    <button class="btn" id="clear-chat-btn">Clear Chat</button>
                </div>
            </div>
            <div id="chat-log"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input-field" placeholder="Ask the agent a question or give a command..." disabled>
                <button class="btn btn-primary" id="chat-send-btn" disabled>Send</button>
            </div>
        </div>

        <!-- Right panel: Model Cards Manager -->
        <div id="models-panel" class="models-panel">
            <div class="panel-header">
                <span>⚙ Model Cards</span>
                <button id="close-panel-btn" class="close-btn" title="Close panel">✕</button>
            </div>
            <div id="cards-list" class="cards-list">
                <!-- Cards rendered by JS -->
            </div>
            <div class="panel-footer">
                <button id="add-card-btn" class="btn">+ Add Model</button>
                <button id="save-cards-btn" class="btn btn-primary">💾 Save</button>
            </div>
        </div>
    </div>

    <script>
        // ─── State ────────────────────────────────────────────────────────────────
        let eventSource = null;
        let agentActive = false;
        let modelCards = [];
        let prevLlmLoaded = null;
        let prevLlmModelName = null;
        let prevLlmBackend = null;



        const DEFAULT_CARDS = [
            { id: uid(), name: "Ollama (Local)",    url: "http://localhost:11434/v1", model: "qwen2.5:1.5b", api_key: "", temperature: 0.0 },
            { id: uid(), name: "LM Studio (Local)", url: "http://localhost:1234/v1",  model: "",             api_key: "", temperature: 0.0 },
            { id: uid(), name: "Llama.cpp (Local)", url: "http://localhost:8080/v1",  model: "",             api_key: "", temperature: 0.0 }
        ];

        function uid() { return Math.random().toString(36).slice(2, 10); }

        if (window.marked && typeof window.marked.setOptions === "function") {
            window.marked.setOptions({ gfm: true, breaks: true });
        }

        // ─── Init ─────────────────────────────────────────────────────────────────
        document.addEventListener("DOMContentLoaded", async () => {
            initTheme();
            await loadModelCards();
            connectEventStream();
            setupControls();
            document.getElementById("theme-toggle-btn").addEventListener("click", toggleTheme);
        });

        // ─── Theme ────────────────────────────────────────────────────────────────
        function initTheme() {
            const saved = localStorage.getItem("ssn_theme");
            const theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
            updateThemeBtn(theme);
        }

        function toggleTheme() {
            const cur = document.documentElement.getAttribute("data-theme") || "light";
            const next = cur === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("ssn_theme", next);
            updateThemeBtn(next);
        }

        function updateThemeBtn(theme) {
            const btn = document.getElementById("theme-toggle-btn");
            if (btn) btn.innerHTML = theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
        }

        // ─── Model Cards ──────────────────────────────────────────────────────────
        async function loadModelCards() {
            try {
                const resp = await fetch("/agent_resource/model_card.json?v=" + Date.now());
                if (!resp.ok) throw new Error("not found");
                const data = await resp.json();
                modelCards = Array.isArray(data.cards) && data.cards.length > 0
                    ? data.cards
                    : deepClone(DEFAULT_CARDS);
                if (!Array.isArray(data.cards) || data.cards.length === 0) saveModelCards();
            } catch (e) {
                modelCards = deepClone(DEFAULT_CARDS);
                saveModelCards();
            }
            populateDropdown();
            renderCardsPanel();
        }

        function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

        function populateDropdown() {
            const sel = document.getElementById("model-selector");
            const prevVal = sel.value;
            sel.innerHTML = "";
            modelCards.forEach((card, i) => {
                const opt = document.createElement("option");
                opt.value = String(i);
                opt.textContent = card.name || `Model ${i + 1}`;
                sel.appendChild(opt);
            });
            if (prevVal !== "" && parseInt(prevVal) < modelCards.length) sel.value = prevVal;
        }

        function saveModelCards() {
            sendAction({ action: "save_model_cards", cards: modelCards });
        }

        function renderCardsPanel() {
            const list = document.getElementById("cards-list");
            list.innerHTML = "";
            modelCards.forEach((card, i) => list.appendChild(createCardEl(card, i)));
        }

        function createCardEl(card, index) {
            const div = document.createElement("div");
            div.className = "model-card";

            // Header
            const header = document.createElement("div");
            header.className = "model-card-header";

            // Drag handle for reordering
            const dragHandle = document.createElement("span");
            dragHandle.className = "drag-handle";
            dragHandle.title = "Drag to reorder";
            dragHandle.textContent = "☰";
            dragHandle.addEventListener("mousedown", (e) => e.stopPropagation());

            const nameLabel = document.createElement("span");
            nameLabel.className = "card-name-label";
            nameLabel.textContent = card.name || `Model ${index + 1}`;

            const delBtn = document.createElement("button");
            delBtn.className = "card-delete-btn";
            delBtn.title = "Remove model";
            delBtn.textContent = "✕";
            delBtn.addEventListener("click", (e) => { e.stopPropagation(); removeCard(index); });

            const expandBtn = document.createElement("button");
            expandBtn.className = "card-expand-btn";
            expandBtn.title = "Expand / collapse";
            expandBtn.textContent = "▾";

            header.appendChild(dragHandle);
            header.appendChild(nameLabel);
            header.appendChild(delBtn);
            header.appendChild(expandBtn);

            header.addEventListener("click", (e) => {
                if (e.target.closest(".card-delete-btn") || e.target.closest(".drag-handle")) return;
                div.classList.toggle("expanded");
                expandBtn.textContent = div.classList.contains("expanded") ? "▴" : "▾";
            });

            // Pointer-based drag-to-reorder (works inside PyQt WebEngineView)
            dragHandle.addEventListener("mousedown", (e) => {
                e.preventDefault();
                e.stopPropagation();
                initCardDrag(e, index);
            });

            // Body — all editable fields
            const body = document.createElement("div");
            body.className = "model-card-body";

            const fields = [
                { key: "name",        label: "Name",        type: "text",     placeholder: "e.g. My Ollama"                           },
                { key: "url",         label: "Base URL",    type: "text",     placeholder: "http://localhost:11434/v1"                 },
                { key: "model",       label: "Model Name",  type: "text",     placeholder: "e.g. qwen2.5:1.5b (leave blank = auto)"   },
                { key: "temperature", label: "Temperature", type: "number",   placeholder: "0.0", min: "0", max: "2", step: "0.1", width: "80px" }
            ];

            fields.forEach(({ key, label, type, placeholder, min, max, step, width }) => {
                const fieldDiv = document.createElement("div");
                fieldDiv.className = "card-field";
                const lbl = document.createElement("div");
                lbl.className = "card-field-label";
                lbl.textContent = label;
                const inp = document.createElement("input");
                inp.type = type;
                inp.placeholder = placeholder;
                inp.value = key === "temperature" ? (card[key] ?? 0.0) : (card[key] || "");
                if (min !== undefined) { inp.min = min; inp.max = max; inp.step = step; }
                if (width) inp.style.width = width;
                inp.addEventListener("input", () => {
                    if (!modelCards[index]) return;
                    modelCards[index][key] = key === "temperature" ? (parseFloat(inp.value) || 0.0) : inp.value;
                    if (key === "name") { nameLabel.textContent = inp.value || `Model ${index + 1}`; populateDropdown(); }
                });
                fieldDiv.appendChild(lbl);
                fieldDiv.appendChild(inp);
                body.appendChild(fieldDiv);
            });

            // API key field (password with show/hide toggle)
            const apiDiv = document.createElement("div");
            apiDiv.className = "card-field";
            const apiLbl = document.createElement("div");
            apiLbl.className = "card-field-label";
            apiLbl.textContent = "API Key";
            const apiRow = document.createElement("div");
            apiRow.style.cssText = "display:flex;gap:6px;align-items:center;";
            const apiInp = document.createElement("input");
            apiInp.type = "password";
            apiInp.placeholder = "sk-... (leave blank if not needed)";
            apiInp.value = card.api_key || "";
            apiInp.style.flex = "1";
            apiInp.addEventListener("input", () => {
                if (modelCards[index]) modelCards[index].api_key = apiInp.value;
            });
            const showBtn = document.createElement("button");
            showBtn.className = "btn show-key-btn";
            showBtn.type = "button";
            showBtn.textContent = "Show";
            showBtn.addEventListener("click", () => {
                apiInp.type = apiInp.type === "password" ? "text" : "password";
                showBtn.textContent = apiInp.type === "password" ? "Show" : "Hide";
            });
            apiRow.appendChild(apiInp);
            apiRow.appendChild(showBtn);
            apiDiv.appendChild(apiLbl);
            apiDiv.appendChild(apiRow);
            body.appendChild(apiDiv);

            // Custom Options (JSON) field
            const optDiv = document.createElement("div");
            optDiv.className = "card-field";
            const optLbl = document.createElement("div");
            optLbl.className = "card-field-label";
            optLbl.textContent = "Custom Options (JSON)";
            const optArea = document.createElement("textarea");
            optArea.style.cssText = "width:100%;height:60px;font-family:var(--font-mono);font-size:11.5px;padding:6px;border:1px solid var(--border-color);border-radius:6px;background:var(--input-bg);color:var(--input-text);resize:vertical;";
            optArea.placeholder = 'e.g. {\n  "reasoning_effort": "low"\n}';
            
            let initialVal = "";
            if (card.options) {
                try {
                    initialVal = typeof card.options === "string" ? card.options : JSON.stringify(card.options, null, 2);
                } catch (e) {
                    initialVal = String(card.options);
                }
            }
            optArea.value = initialVal;
            
            optArea.addEventListener("input", () => {
                if (!modelCards[index]) return;
                const rawVal = optArea.value.trim();
                if (rawVal === "") {
                    modelCards[index].options = null;
                    optArea.style.borderColor = "";
                } else {
                    try {
                        modelCards[index].options = JSON.parse(rawVal);
                        optArea.style.borderColor = ""; // valid
                    } catch (e) {
                        optArea.style.borderColor = "var(--danger)";
                    }
                }
            });
            optArea.addEventListener("keydown", (e) => {
                if (e.key === "Tab") {
                    e.preventDefault();
                    const start = optArea.selectionStart;
                    const end = optArea.selectionEnd;
                    const val = optArea.value;
                    optArea.value = val.substring(0, start) + "  " + val.substring(end);
                    optArea.selectionStart = optArea.selectionEnd = start + 2;
                    optArea.dispatchEvent(new Event("input"));
                }
            });
            optDiv.appendChild(optLbl);
            optDiv.appendChild(optArea);
            body.appendChild(optDiv);

            div.appendChild(header);
            div.appendChild(body);
            return div;
        }


        function removeCard(index) {
            if (modelCards.length <= 1) { appendSystemMsg("Cannot remove the last model card."); return; }
            modelCards.splice(index, 1);
            populateDropdown();
            renderCardsPanel();
        }

        /* ── Mouse-based drag-to-reorder for model cards ── */
        let _dragState = null;

        function initCardDrag(startEvent, fromIndex) {
            const cardsList = document.querySelector(".cards-list");
            if (!cardsList) return;

            const allCards = Array.from(cardsList.querySelectorAll(".model-card"));
            allCards[fromIndex].classList.add("dragging");

            let toIndex = fromIndex;

            function onMouseMove(e) {
                // Clear indicators
                allCards.forEach(c => c.classList.remove("drag-over-top", "drag-over-bottom"));

                // Find which card the cursor is over
                for (let i = 0; i < allCards.length; i++) {
                    const rect = allCards[i].getBoundingClientRect();
                    if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
                        const midY = rect.top + rect.height / 2;
                        if (e.clientY < midY) {
                            toIndex = i;
                            allCards[i].classList.add("drag-over-top");
                        } else {
                            toIndex = i + 1;
                            allCards[i].classList.add("drag-over-bottom");
                        }
                        break;
                    }
                }
            }

            function onMouseUp() {
                document.removeEventListener("mousemove", onMouseMove);
                document.removeEventListener("mouseup", onMouseUp);

                allCards.forEach(c => c.classList.remove("dragging", "drag-over-top", "drag-over-bottom"));

                // Normalize toIndex after removing fromIndex
                let insertAt = toIndex;
                if (insertAt > fromIndex) insertAt--;
                if (insertAt === fromIndex) return;

                const [moved] = modelCards.splice(fromIndex, 1);
                modelCards.splice(insertAt, 0, moved);
                saveModelCards();
                populateDropdown();
                renderCardsPanel();
            }

            document.addEventListener("mousemove", onMouseMove);
            document.addEventListener("mouseup", onMouseUp);
        }


        function addCard() {
            modelCards.push({ id: uid(), name: "New Model", url: "", model: "", api_key: "", temperature: 0.0 });
            populateDropdown();
            renderCardsPanel();
            const cards = document.querySelectorAll(".model-card");
            const last = cards[cards.length - 1];
            if (last) {
                last.classList.add("expanded");
                const expBtn = last.querySelector(".card-expand-btn");
                if (expBtn) expBtn.textContent = "▴";
                last.scrollIntoView({ behavior: "smooth" });
            }
        }

        // ─── Controls ─────────────────────────────────────────────────────────────
        function setupControls() {
            const inputField  = document.getElementById("chat-input-field");
            const sendBtn     = document.getElementById("chat-send-btn");
            const clearBtn    = document.getElementById("clear-chat-btn");
            const toggleBtn   = document.getElementById("agent-toggle-btn");
            const modelSel    = document.getElementById("model-selector");
            const panelBtn    = document.getElementById("models-panel-btn");
            const closeBtn    = document.getElementById("close-panel-btn");
            const addCardBtn  = document.getElementById("add-card-btn");
            const saveCardsBtn = document.getElementById("save-cards-btn");

            const toggleInput = document.getElementById("agent-toggle-input");

            sendBtn.addEventListener("click", sendAgentQuery);
            inputField.addEventListener("keydown", (e) => { if (e.key === "Enter") sendAgentQuery(); });

            clearBtn.addEventListener("click", () => {
                sendAction({ action: "clear_history" });
                document.getElementById("chat-log").innerHTML = "";
                appendSystemMsg("Chat history and context memory cleared.");
            });

            toggleInput.addEventListener("change", () => {
                if (toggleInput.checked) {
                    const idx = parseInt(modelSel.value);
                    const card = isNaN(idx) ? null : modelCards[idx];
                    if (card) {
                        sendAction({ action: "set_backend", card: card });
                    } else {
                        toggleInput.checked = false; // revert if no card
                    }
                } else {
                    sendAction({ action: "set_backend", card: null });
                }
            });

            modelSel.addEventListener("change", () => {
                if (agentActive) {
                    const idx = parseInt(modelSel.value);
                    const card = isNaN(idx) ? null : modelCards[idx];
                    if (card) sendAction({ action: "set_backend", card: card });
                }
            });

            panelBtn.addEventListener("click", () => {
                document.getElementById("models-panel").classList.toggle("open");
            });

            closeBtn.addEventListener("click", () => {
                document.getElementById("models-panel").classList.remove("open");
            });

            addCardBtn.addEventListener("click", addCard);

            saveCardsBtn.addEventListener("click", () => {
                saveModelCards();
                const orig = saveCardsBtn.textContent;
                saveCardsBtn.textContent = "✓ Saved!";
                saveCardsBtn.style.backgroundColor = "#22c55e";
                saveCardsBtn.style.borderColor = "#22c55e";
                setTimeout(() => {
                    saveCardsBtn.textContent = orig;
                    saveCardsBtn.style.backgroundColor = "";
                    saveCardsBtn.style.borderColor = "";
                }, 1600);
            });
        }

        // ─── SSE ──────────────────────────────────────────────────────────────────
        function connectEventStream() {
            const statusBadge = document.getElementById("connection-status");
            eventSource = new EventSource("/api/events");

            eventSource.onopen = () => {
                statusBadge.innerText = "Connected";
                statusBadge.style.backgroundColor = "var(--connection-active-bg)";
                statusBadge.style.color = "var(--connection-active-text)";
            };
            eventSource.onerror = () => {
                statusBadge.innerText = "Reconnecting...";
                statusBadge.style.backgroundColor = "var(--connection-reconnecting-bg)";
                statusBadge.style.color = "var(--connection-reconnecting-text)";
            };
            eventSource.onmessage = (event) => handleServerEvent(JSON.parse(event.data));
        }

        function handleServerEvent(event) {
            switch (event.type) {
                case "init":
                    prevLlmLoaded = event.data.llm_loaded;
                    prevLlmModelName = event.data.llm_model_name;
                    prevLlmBackend = event.data.llm_backend;
                    updateLLMState(event.data, true);
                    if (event.data.llm_history && event.data.llm_history.length > 0) {
                        renderHistory(event.data.llm_history);
                    } else {
                        document.getElementById("chat-log").innerHTML = "";
                        appendSystemMsg(event.data.llm_loaded
                            ? `Agent active: ${event.data.llm_model_name}`
                            : "Agent is inactive. Select a model and press the toggle button to activate.");
                    }
                    break;
                case "backend_state":
                    updateLLMState(event, false);
                    break;
                case "agent_thinking":
                    setAgentThinking(event.model_name);
                    break;
                case "agent_response":
                    appendAgentMsg(event.explanation, event.commands, event.tokens, event.terminal_output, event.reasoning);
                    enableInput(true);
                    break;
                case "agent_error":
                    appendErrorMsg(event.error);
                    enableInput(true);
                    break;
            }
        }

        function updateLLMState(data, isInit = false) {
            const toggleInput = document.getElementById("agent-toggle-input");
            const inputField  = document.getElementById("chat-input-field");
            const sendBtn     = document.getElementById("chat-send-btn");
            const badge       = document.getElementById("active-model-badge");

            agentActive = !!data.llm_loaded;
            inputField.disabled = !agentActive;
            sendBtn.disabled = !agentActive;
            toggleInput.checked = agentActive;

            if (agentActive) {
                badge.textContent = data.llm_model_name || "LLM";
                badge.classList.add("active");
            } else {
                badge.textContent = "Deactivated";
                badge.classList.remove("active");
            }

            const loadedChanged = prevLlmLoaded !== data.llm_loaded;
            const modelChanged  = prevLlmModelName !== data.llm_model_name;

            if (!isInit && (loadedChanged || modelChanged)) {
                if (!data.llm_loaded) appendSystemMsg("Agent deactivated.");
                else appendSystemMsg(`Agent activated: ${data.llm_model_name}`);
            }

            prevLlmLoaded    = data.llm_loaded;
            prevLlmModelName = data.llm_model_name;
            prevLlmBackend   = data.llm_backend;
        }

        // ─── Chat helpers ─────────────────────────────────────────────────────────
        function sendAgentQuery() {
            const inputField = document.getElementById("chat-input-field");
            const query = inputField.value.trim();
            if (!query) return;
            appendUserMsg(query);
            inputField.value = "";
            enableInput(false);
            sendAction({ action: "agent_query", query: query });
        }

        function enableInput(enabled) {
            const f = document.getElementById("chat-input-field");
            const b = document.getElementById("chat-send-btn");
            f.disabled = !enabled;
            b.disabled = !enabled;
            if (enabled) f.focus();
        }

        function setAgentThinking(modelName) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-system";
            wrapper.id = "thinking-bubble";
            wrapper.innerHTML = `<div class="msg msg-system">⏳ Thinking (${escapeHtml(modelName)})...</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendSystemMsg(msg) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-system";
            wrapper.innerHTML = `<div class="msg msg-system">${escapeHtml(msg)}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendUserMsg(msg) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-user";
            wrapper.innerHTML = `<div class="msg msg-user">${escapeHtml(msg)}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendAgentMsg(explanation, commands, tokens, terminalOutput, reasoning) {
            const thinking = document.getElementById("thinking-bubble");
            if (thinking) thinking.remove();

            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-agent";

            const hdr = document.createElement("div");
            hdr.className = "msg-agent-header";
            hdr.innerHTML = `<span>🤖</span><span>Assistant</span>`;
            wrapper.appendChild(hdr);

            if (reasoning) {
                const thoughtBox = document.createElement("div");
                thoughtBox.className = "thought-box";
                
                const thoughtHdr = document.createElement("div");
                thoughtHdr.className = "thought-box-header";
                thoughtHdr.innerHTML = `<span>Thought Process</span><span class="thought-box-toggle">▶</span>`;
                
                const thoughtContent = document.createElement("div");
                thoughtContent.className = "thought-box-content";
                thoughtContent.textContent = reasoning;
                
                thoughtBox.appendChild(thoughtHdr);
                thoughtBox.appendChild(thoughtContent);
                
                thoughtHdr.addEventListener("click", () => {
                    thoughtBox.classList.toggle("expanded");
                    const isExpanded = thoughtBox.classList.contains("expanded");
                    thoughtHdr.querySelector(".thought-box-toggle").textContent = isExpanded ? "▼" : "▶";
                });
                
                wrapper.appendChild(thoughtBox);
            }

            const msgDiv = document.createElement("div");
            msgDiv.className = "msg msg-agent";
            let html = "";
            if (window.marked && typeof window.marked.parse === "function") {
                try { html = window.marked.parse(explanation); } catch (e) { html = escapeHtml(explanation).replace(/\n/g, "<br>"); }
            } else {
                html = escapeHtml(explanation).replace(/\n/g, "<br>");
            }
            msgDiv.innerHTML = html;
            wrapper.appendChild(msgDiv);

            if (commands) {
                const box = document.createElement("div");
                box.className = "code-box";
                const boxHdr = document.createElement("div");
                boxHdr.className = "code-box-header";
                boxHdr.innerHTML = `<span>Executed Command(s)</span>`;
                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "Copy";
                copyBtn.addEventListener("click", () => copyText(commands, copyBtn));
                boxHdr.appendChild(copyBtn);
                box.appendChild(boxHdr);
                const codeText = document.createElement("div");
                codeText.textContent = commands;
                box.appendChild(codeText);
                wrapper.appendChild(box);
            }

            if (terminalOutput) {
                const termBox = document.createElement("div");
                termBox.className = "terminal-output-box";
                const termHdr = document.createElement("div");
                termHdr.className = "terminal-output-header";
                termHdr.innerHTML = `<span>Terminal Output</span>`;
                termBox.appendChild(termHdr);
                const pre = document.createElement("pre");
                pre.textContent = terminalOutput;
                termBox.appendChild(pre);
                wrapper.appendChild(termBox);
            }

            if (tokens && tokens.total) {
                const ti = document.createElement("div");
                ti.className = "token-info";
                ti.textContent = `Tokens: ${tokens.total} (${tokens.prompt} prompt, ${tokens.completion} completion)`;
                wrapper.appendChild(ti);
            }

            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendErrorMsg(err) {
            const thinking = document.getElementById("thinking-bubble");
            if (thinking) thinking.remove();
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-error";
            wrapper.innerHTML = `<div class="msg msg-error"><b>Error:</b> ${escapeHtml(err)}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function renderHistory(history) {
            const chatLog = document.getElementById("chat-log");
            chatLog.innerHTML = "";
            history.forEach(msg => {
                if (msg.role === "user") {
                    appendUserMsg(msg.content);
                } else if (msg.role === "assistant") {
                    if (msg.explanation !== undefined) appendAgentMsg(msg.explanation || "", msg.commands || "", msg.tokens, msg.terminal_output || "", msg.reasoning || "");
                    else appendAgentMsg(msg.content || "", "", null, "", "");
                }
            });
        }

        // ─── Utilities ────────────────────────────────────────────────────────────
        function sendAction(payload) {
            fetch("/api/action", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Action error:", err));
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                btn.style.color = "#34d399";
                setTimeout(() => { btn.textContent = orig; btn.style.color = ""; }, 1500);
            }).catch(err => console.error("Clipboard error:", err));
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g,"&amp;").replace(/</g,"&lt;")
                .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
        }
    </script>
</body>
</html>
