<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSN Viewer Metadata</title>
    <!-- Load local Tabulator CSS -->
    <link rel="stylesheet" href="css/tabulator.min.css">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --primary: #0969da;
            --primary-hover: #0353b2;
            --danger: #ef4444;
            --font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header bar */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            background-color: #e2e8f0;
            color: var(--text-secondary);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 9999px;
            font-weight: 500;
        }

        /* Workspace Grid */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 55px);
            overflow: hidden;
            background-color: var(--bg-card);
        }

        .pane-main {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .pane-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 25px;
        }

        .pane-title {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"].filter-input {
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-primary);
            background-color: var(--bg-card);
            outline: none;
        }

        input[type="text"].filter-input:focus {
            border-color: var(--primary);
        }

        #table-container {
            flex: 1;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }

        #spreadsheet-table {
            height: 100%;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 SSN Viewer Metadata Spreadsheet</h1>
        <div id="connection-status" class="status-badge">Connecting...</div>
    </header>

    <div class="workspace">
        <div class="pane-main">
            <div class="pane-header">
                <span class="pane-title">Sequence Metadata Spreadsheet</span>
                <div class="header-controls">
                    <input type="text" id="table-search" class="filter-input" placeholder="Search Node ID..." style="width: 150px;">
                </div>
            </div>
            <div id="table-container">
                <div id="spreadsheet-table"></div>
            </div>
        </div>
    </div>

    <!-- Load local Tabulator JS -->
    <script src="js/tabulator.min.js"></script>
    <script>
        let table = null;
        let eventSource = null;
        let isEditingFromVispy = false;

        document.addEventListener("DOMContentLoaded", () => {
            connectEventStream();
        });

        function connectEventStream() {
            const statusBadge = document.getElementById("connection-status");
            eventSource = new EventSource("/api/events");

            eventSource.onopen = () => {
                statusBadge.innerText = "Connected";
                statusBadge.style.backgroundColor = "#dcfce7";
                statusBadge.style.color = "#15803d";
            };

            eventSource.onerror = () => {
                statusBadge.innerText = "Reconnecting...";
                statusBadge.style.backgroundColor = "#fef3c7";
                statusBadge.style.color = "#b45309";
            };

            eventSource.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleServerEvent(message);
            };
        }

        function handleServerEvent(event) {
            switch(event.type) {
                case "init":
                    initSpreadsheet(event.data);
                    break;
                case "selection_changed":
                    syncSelectionFromVispy(event.indices);
                    break;
                case "visibility_changed":
                    syncVisibilityFromVispy(event.visible_mask);
                    break;
                case "state_updated":
                    if (table && event.metadata) {
                        isEditingFromVispy = true;
                        table.setData(event.metadata).then(() => {
                            syncSelectionFromVispy(event.selected_indices);
                            isEditingFromVispy = false;
                        });
                    }
                    break;
            }
        }

        function initSpreadsheet(data) {
            const columns = [
                {
                    formatter: "rowSelection", 
                    titleFormatter: "rowSelection", 
                    hoversort: false, 
                    headerSort: false, 
                    width: 30, 
                    cellClick: (e, cell) => { cell.getRow().toggleSelect(); }
                },
                {title: "Node ID", field: "Node ID", width: 300, headerFilter: "input", sorter: "string"}
            ];

            data.columns.forEach(col => {
                columns.push({
                    title: col,
                    field: col,
                    editor: "input",
                    sorter: "string",
                    headerFilter: "input"
                });
            });

            table = new Tabulator("#spreadsheet-table", {
                data: data.rows,
                layout: "fitColumns",
                columns: columns,
                selectable: true,
                selectableRangeMode: "click",
                virtualDom: true,
                placeholder: "No network data loaded"
            });

            table.on("rowSelectionChanged", (data, rows) => {
                if (isEditingFromVispy) return;
                const selectedIds = data.map(r => r.id);
                sendAction({
                    action: "select",
                    indices: selectedIds
                });
            });

            table.on("cellEdited", (cell) => {
                const row = cell.getRow().getData();
                sendAction({
                    action: "edit_cell",
                    row: row.id,
                    column: cell.getField(),
                    value: cell.getValue()
                });
            });

            document.getElementById("table-search").addEventListener("input", (e) => {
                table.setFilter("Node ID", "like", e.target.value);
            });

            syncSelectionFromVispy(data.selected_indices);
        }

        function syncSelectionFromVispy(indices) {
            if (!table) return;
            isEditingFromVispy = true;
            table.deselectRow();
            if (indices && indices.length > 0) {
                table.selectRow(indices);
                table.scrollToRow(indices[0], "center", false).catch(()=>{});
            }
            isEditingFromVispy = false;
        }

        function syncVisibilityFromVispy(visibleMask) {
            if (!table) return;
            table.setFilter((row) => {
                return visibleMask[row.id] === true;
            });
        }

        function sendAction(payload) {
            fetch("/api/action", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(err => {
                console.error("Action error:", err);
            });
        }
    </script>
</body>
</html>
