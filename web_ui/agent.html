<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSN Viewer Agent Chat</title>
    <!-- Load Inter and Fira Code fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Load marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* CSS Design System with theme variable support */
        :root {
            /* Light theme (Default) */
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --bg-bubble-user: #e2e8f0;
            --text-bubble-user: #0f172a;
            --bg-bubble-agent: transparent;
            --text-bubble-agent: #0f172a;
            --primary: #0969da;
            --primary-hover: #0353b2;
            --danger: #ef4444;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'Fira Code', Consolas, Monaco, monospace;
            --code-bg: #f6f8fa;
            --code-border: #d0d7de;
            --code-text: #24292f;
            --code-inline-text: #cf222e;
            --input-bg: #ffffff;
            --input-text: #0f172a;
            --connection-bg: #e2e8f0;
            --connection-text: #475569;
            --connection-active-bg: #dcfce7;
            --connection-active-text: #15803d;
            --connection-reconnecting-bg: #fef3c7;
            --connection-reconnecting-text: #b45309;
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            /* Dark theme */
            --bg-main: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --bg-bubble-user: #27272a;
            --text-bubble-user: #f4f4f5;
            --bg-bubble-agent: transparent;
            --text-bubble-agent: #f4f4f5;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --code-bg: #161b22;
            --code-border: #30363d;
            --code-text: #e6edf3;
            --code-inline-text: #ff7b72;
            --input-bg: #09090b;
            --input-text: #f4f4f5;
            --connection-bg: #27272a;
            --connection-text: #a1a1aa;
            --connection-active-bg: #064e3b;
            --connection-active-text: #34d399;
            --connection-reconnecting-bg: #78350f;
            --connection-reconnecting-text: #fbbf24;
            --badge-bg: #27272a;
            --badge-text: #e4e4e7;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Header bar */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 35px;
            box-shadow: var(--shadow);
            transition: background-color 0.2s, border-color 0.2s;
        }

        header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            background-color: var(--connection-bg);
            color: var(--connection-text);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 500;
            transition: all 0.2s;
        }

        /* Workspace Grid */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* Agent Chat Panel */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px;
            box-sizing: border-box;
            background-color: var(--bg-main);
        }

        .pane-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .pane-title {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Controls inside header */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 5px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-primary);
            background-color: var(--bg-card);
            outline: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            outline: none;
            transition: all 0.15s;
            box-shadow: var(--shadow);
        }

        .btn:hover {
            background-color: var(--badge-bg);
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            color: #ffffff;
            border-color: transparent;
        }

        #chat-log {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-card);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 12px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Chat bubbles */
        .msg-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 4px;
            animation: fadeInUp 0.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-wrapper-user {
            justify-content: flex-end;
        }

        .msg-wrapper-agent {
            justify-content: flex-start;
            flex-direction: column;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 18px;
            margin-bottom: 8px;
        }

        .msg-wrapper-system, .msg-wrapper-error {
            justify-content: center;
        }

        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 13.5px;
            line-height: 1.5;
        }

        .msg-system {
            background-color: var(--badge-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 11.5px;
            border-radius: 6px;
            text-align: center;
            padding: 5px 12px;
            margin: 4px auto;
            max-width: 85%;
        }

        .msg-user {
            background-color: var(--bg-bubble-user);
            color: var(--text-bubble-user);
            border-bottom-right-radius: 2px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .msg-agent-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 6px;
            user-select: none;
        }

        .msg-agent-header .avatar {
            font-size: 13px;
        }

        .msg-agent {
            background-color: var(--bg-bubble-agent);
            color: var(--text-bubble-agent);
            padding: 0;
            max-width: 100%;
            width: 100%;
        }

        /* Markdown Styles inside Agent Message */
        .msg-agent p {
            margin: 0 0 10px 0;
        }
        .msg-agent p:last-child {
            margin-bottom: 0;
        }
        .msg-agent h1, .msg-agent h2, .msg-agent h3, .msg-agent h4 {
            margin: 16px 0 8px 0;
            color: var(--text-primary);
            font-weight: 600;
        }
        .msg-agent h1 { font-size: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
        .msg-agent h2 { font-size: 14.5px; }
        .msg-agent h3 { font-size: 13.5px; }
        
        .msg-agent ul, .msg-agent ol {
            margin: 0 0 10px 0;
            padding-left: 20px;
        }
        .msg-agent li {
            margin-bottom: 4px;
        }
        
        .msg-agent code {
            font-family: var(--font-mono);
            font-size: 11.5px;
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            color: var(--code-inline-text);
            padding: 2px 5px;
            border-radius: 4px;
        }
        
        .msg-agent pre {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 10px 14px;
            overflow-x: auto;
            margin: 8px 0 12px 0;
        }
        .msg-agent pre code {
            padding: 0;
            background-color: transparent;
            border: none;
            color: var(--code-text);
            font-size: 12px;
        }
        
        .msg-agent strong {
            font-weight: 600;
            color: var(--text-primary);
        }
        .msg-agent em {
            font-style: italic;
        }
        .msg-agent blockquote {
            border-left: 4px solid var(--primary);
            margin: 0 0 10px 0;
            padding-left: 12px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .msg-error {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: var(--danger);
            border-radius: 8px;
            padding: 10px 14px;
            margin: 4px auto;
            max-width: 85%;
            font-weight: 500;
        }
        [data-theme="dark"] .msg-error {
            background-color: #450a0a;
            border-color: #7f1d1d;
            color: #fca5a5;
        }

        /* Terminal style executed commands box (matches active theme, like GitHub/VSCode) */
        .code-box {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--code-text);
            margin-top: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            position: relative;
            box-shadow: var(--shadow);
            width: 100%;
            box-sizing: border-box;
        }

        .code-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--code-border);
            margin-bottom: 8px;
            padding-bottom: 6px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .copy-btn:hover {
            color: var(--text-primary);
            background-color: var(--border-color);
        }

        /* Token Info badge */
        .token-info {
            font-size: 10.5px;
            color: var(--text-secondary);
            margin-top: 8px;
            user-select: none;
            display: inline-block;
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Terminal style executed command outputs (matches active theme) */
        .terminal-output-box {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 11.5px;
            color: var(--code-text);
            margin-top: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
            width: 100%;
            box-sizing: border-box;
            box-shadow: var(--shadow);
        }

        .terminal-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--code-border);
            margin-bottom: 6px;
            padding-bottom: 4px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }

        .terminal-output-box pre {
            margin: 0;
            padding: 0;
            background: transparent;
            border: none;
            overflow-x: auto;
        }

        /* Input Panel */
        .chat-input-bar {
            display: flex;
            gap: 8px;
            height: 40px;
        }

        #chat-input-field {
            flex: 1;
            padding: 0 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13.5px;
            outline: none;
            background-color: var(--input-bg);
            color: var(--input-text);
            box-shadow: var(--shadow);
            transition: all 0.15s;
        }

        #chat-input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        #chat-input-field:disabled {
            background-color: var(--badge-bg);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 SSN Viewer Agent Chat</h1>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="btn" id="theme-toggle-btn" style="border-radius: 9999px; padding: 4px 12px; font-weight: 500; box-shadow: none;">🌙 Dark Mode</button>
            <div id="connection-status" class="status-badge">Connecting...</div>
        </div>
    </header>

    <div class="workspace">
        <div class="chat-container">
            <div class="pane-header" style="border-radius: 8px 8px 0 0; border: 1px solid var(--border-color); border-bottom: none;">
                <span class="pane-title">Agent Control Panel</span>
                <div class="header-controls">
                    <span id="active-model-badge" style="font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 6px; background-color: var(--badge-bg); color: var(--badge-text); border: 1px solid var(--border-color); display: none; vertical-align: middle;"></span>
                    <select id="backend-selector">
                        <option value="0">Deactivated</option>
                        <option value="1">API Server</option>
                        <option value="2">Local LLM</option>
                    </select>
                    <button class="btn" id="clear-chat-btn">Clear Chat</button>
                </div>
            </div>
            <div id="chat-log" style="border-top-left-radius: 0; border-top-right-radius: 0;"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input-field" placeholder="Ask Agent a question or command..." disabled>
                <button class="btn btn-primary" id="chat-send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let prevLlmLoaded = null;
        let prevLlmModelName = null;
        let prevLlmBackend = null;

        // Configure marked options
        if (window.marked && typeof window.marked.setOptions === "function") {
            window.marked.setOptions({
                gfm: true,
                breaks: true,
                sanitize: false
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            initTheme();
            connectEventStream();
            setupAgentControls();
            
            // Register theme toggle action
            document.getElementById("theme-toggle-btn").addEventListener("click", toggleTheme);
        });

        // --- Theme Management ---
        function initTheme() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.documentElement.setAttribute("data-theme", savedTheme);
                updateThemeButton(savedTheme);
            } else {
                const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                const initialTheme = systemPrefersDark ? "dark" : "light";
                document.documentElement.setAttribute("data-theme", initialTheme);
                updateThemeButton(initialTheme);
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.getElementById("theme-toggle-btn");
            if (btn) {
                btn.innerHTML = theme === "dark" ? "☀️ Light Mode" : "🌙 Dark Mode";
            }
        }

        // --- Server Event Stream ---
        function connectEventStream() {
            const statusBadge = document.getElementById("connection-status");
            eventSource = new EventSource("/api/events");

            eventSource.onopen = () => {
                statusBadge.innerText = "Connected";
                statusBadge.style.backgroundColor = "var(--connection-active-bg)";
                statusBadge.style.color = "var(--connection-active-text)";
            };

            eventSource.onerror = () => {
                statusBadge.innerText = "Reconnecting...";
                statusBadge.style.backgroundColor = "var(--connection-reconnecting-bg)";
                statusBadge.style.color = "var(--connection-reconnecting-text)";
            };

            eventSource.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleServerEvent(message);
            };
        }

        function handleServerEvent(event) {
            switch(event.type) {
                case "init":
                    // Cache the current states so updateLLMState won't print duplicate status banners
                    prevLlmLoaded = event.data.llm_loaded;
                    prevLlmModelName = event.data.llm_model_name;
                    prevLlmBackend = event.data.llm_backend;
                    
                    updateLLMState(event.data, true);
                    
                    if (event.data.llm_history && event.data.llm_history.length > 0) {
                        renderHistory(event.data.llm_history);
                    } else {
                        // Clear chat log and show initial status message
                        document.getElementById("chat-log").innerHTML = "";
                        if (!event.data.llm_loaded) {
                            appendSystemMsg("LLM Assist is currently deactivated. Select a backend to begin.");
                        } else {
                            appendSystemMsg(`Activated LLM Assist: ${event.data.llm_model_name}`);
                        }
                    }
                    break;
                case "backend_state":
                    updateLLMState(event, false);
                    break;
                case "agent_thinking":
                    setAgentThinking(event.model_name);
                    break;
                case "agent_response":
                    appendAgentMsg(event.explanation, event.commands, event.tokens, event.terminal_output);
                    enableAgentInput(true);
                    break;
                case "agent_error":
                    appendErrorMsg(event.error);
                    enableAgentInput(true);
                    break;
            }
        }

        function setupAgentControls() {
            const inputField = document.getElementById("chat-input-field");
            const sendBtn = document.getElementById("chat-send-btn");
            const clearBtn = document.getElementById("clear-chat-btn");
            const selector = document.getElementById("backend-selector");

            sendBtn.addEventListener("click", sendAgentQuery);
            inputField.addEventListener("keydown", (e) => {
                if (e.key === "Enter") sendAgentQuery();
            });

            clearBtn.addEventListener("click", () => {
                sendAction({ action: "clear_history" });
                document.getElementById("chat-log").innerHTML = "";
                appendSystemMsg("Chat history and context memory cleared.");
            });

            selector.addEventListener("change", (e) => {
                sendAction({
                    action: "set_backend",
                    index: parseInt(e.target.value)
                });
            });
        }

        function updateLLMState(data, isInit = false) {
            const selector = document.getElementById("backend-selector");
            const inputField = document.getElementById("chat-input-field");
            const sendBtn = document.getElementById("chat-send-btn");
            const modelBadge = document.getElementById("active-model-badge");

            selector.value = !data.llm_loaded ? "0" : (data.llm_backend === "server" ? "1" : "2");
            inputField.disabled = !data.llm_loaded;
            sendBtn.disabled = !data.llm_loaded;

            if (data.llm_loaded && data.llm_model_name) {
                modelBadge.innerText = `Active Model: ${data.llm_model_name}`;
                modelBadge.style.display = "inline-block";
            } else {
                modelBadge.style.display = "none";
            }

            const loadedChanged = prevLlmLoaded !== data.llm_loaded;
            const modelChanged = prevLlmModelName !== data.llm_model_name;
            const backendChanged = prevLlmBackend !== data.llm_backend;

            if (!isInit && (loadedChanged || modelChanged || backendChanged)) {
                if (!data.llm_loaded) {
                    appendSystemMsg("LLM Assist is currently deactivated. Select a backend to begin.");
                } else {
                    appendSystemMsg(`Activated LLM Assist: ${data.llm_model_name} (${data.llm_backend === "server" ? "API Server" : "Local LLM"})`);
                }
            }
            
            prevLlmLoaded = data.llm_loaded;
            prevLlmModelName = data.llm_model_name;
            prevLlmBackend = data.llm_backend;
        }

        function sendAgentQuery() {
            const inputField = document.getElementById("chat-input-field");
            const query = inputField.value.trim();
            if (!query) return;

            appendUserMsg(query);
            inputField.value = "";
            enableAgentInput(false);

            sendAction({
                action: "agent_query",
                query: query
            });
        }

        function enableAgentInput(enabled) {
            document.getElementById("chat-input-field").disabled = !enabled;
            document.getElementById("chat-send-btn").disabled = !enabled;
            if (enabled) {
                document.getElementById("chat-input-field").focus();
            }
        }

        function setAgentThinking(modelName) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-system";
            wrapper.id = "thinking-bubble";
            wrapper.innerHTML = `<div class="msg msg-system">Thinking (${modelName})...</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendSystemMsg(msg) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-system";
            wrapper.innerHTML = `<div class="msg msg-system">${msg}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendUserMsg(msg) {
            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-user";
            wrapper.innerHTML = `<div class="msg msg-user">${escapeHtml(msg)}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendAgentMsg(explanation, commands, tokens, terminalOutput) {
            const thinking = document.getElementById("thinking-bubble");
            if (thinking) thinking.remove();

            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-agent";

            const header = document.createElement("div");
            header.className = "msg-agent-header";
            header.innerHTML = `<span class="avatar">🤖</span> <span>Assistant</span>`;
            wrapper.appendChild(header);

            const msgDiv = document.createElement("div");
            msgDiv.className = "msg msg-agent";
            
            // Parse explanation using marked if available
            let htmlContent = "";
            if (window.marked && typeof window.marked.parse === "function") {
                try {
                    htmlContent = window.marked.parse(explanation);
                } catch (e) {
                    console.error("Markdown parse error:", e);
                    htmlContent = escapeHtml(explanation).replace(/\n/g, '<br>');
                }
            } else {
                htmlContent = escapeHtml(explanation).replace(/\n/g, '<br>');
            }
            msgDiv.innerHTML = htmlContent;
            wrapper.appendChild(msgDiv);

            if (commands) {
                const codeBox = document.createElement("div");
                codeBox.className = "code-box";
                
                const codeHeader = document.createElement("div");
                codeHeader.className = "code-box-header";
                codeHeader.innerHTML = `<span>Executed Command(s)</span>`;
                
                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.innerText = "Copy";
                
                const cmds = commands;
                copyBtn.addEventListener("click", () => copyToClipboard(cmds, copyBtn));
                codeHeader.appendChild(copyBtn);
                
                codeBox.appendChild(codeHeader);
                
                const codeText = document.createElement("div");
                codeText.innerText = commands;
                codeBox.appendChild(codeText);
                
                wrapper.appendChild(codeBox);
            }

            if (terminalOutput) {
                const termBox = document.createElement("div");
                termBox.className = "terminal-output-box";
                
                const termHeader = document.createElement("div");
                termHeader.className = "terminal-output-header";
                termHeader.innerHTML = `<span>Terminal Output</span>`;
                termBox.appendChild(termHeader);
                
                const termText = document.createElement("pre");
                termText.innerText = terminalOutput;
                termBox.appendChild(termText);
                
                wrapper.appendChild(termBox);
            }

            if (tokens && tokens.total) {
                const tokenInfo = document.createElement("div");
                tokenInfo.className = "token-info";
                tokenInfo.innerText = `Tokens: ${tokens.total} (${tokens.prompt} prompt, ${tokens.completion} completion)`;
                wrapper.appendChild(tokenInfo);
            }

            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function appendErrorMsg(err) {
            const thinking = document.getElementById("thinking-bubble");
            if (thinking) thinking.remove();

            const chatLog = document.getElementById("chat-log");
            const wrapper = document.createElement("div");
            wrapper.className = "msg-wrapper msg-wrapper-error";
            wrapper.innerHTML = `<div class="msg msg-error"><b>Error:</b> ${escapeHtml(err)}</div>`;
            chatLog.appendChild(wrapper);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function renderHistory(history) {
            const chatLog = document.getElementById("chat-log");
            chatLog.innerHTML = ""; // Clear existing log
            
            history.forEach(msg => {
                if (msg.role === "user") {
                    appendUserMsg(msg.content);
                } else if (msg.role === "assistant") {
                    if (msg.explanation !== undefined || msg.commands !== undefined) {
                        appendAgentMsg(msg.explanation || "", msg.commands || "", msg.tokens, msg.terminal_output || "");
                    } else {
                        // Fallback for raw content (e.g. if loaded from an older cache format)
                        appendAgentMsg(msg.content || "", "", null, "");
                    }
                }
            });
        }

        function sendAction(payload) {
            fetch("/api/action", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).catch(err => {
                console.error("Action error:", err);
            });
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.color = "#34d399";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.color = "";
                }, 1500);
            }).catch(err => {
                console.error("Failed to copy:", err);
            });
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
